<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>算法王国大冒险</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft YaHei";
}

body{
    overflow:hidden;
    background:linear-gradient(
        180deg,
        #87CEFA 0%,
        #EAF8FF 100%
    );
}

/* ===== 顶部栏 ===== */

header{
    height:70px;
    background:#4CAF50;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    font-weight:bold;
    box-shadow:0 3px 10px rgba(0,0,0,.2);
}

/* ===== 地图区域 ===== */

#gameMap{

    position:relative;

    width:100vw;
    height:calc(100vh - 70px);

    background:
    linear-gradient(
        rgba(255,255,255,.1),
        rgba(255,255,255,.1)
    ),

    linear-gradient(
        180deg,
        #B9F6CA,
        #E8F5E9
    );
}

/* ===== 城堡 ===== */

#castle{

    position:absolute;

    top:40px;
    left:50%;

    transform:translateX(-50%);

    font-size:120px;

    animation:float 3s infinite ease-in-out;
}

@keyframes float{

0%{transform:translateX(-50%) translateY(0);}
50%{transform:translateX(-50%) translateY(-10px);}
100%{transform:translateX(-50%) translateY(0);}

}

/* ===== AI教师 ===== */

#teacherPanel{

    position:absolute;

    left:20px;
    top:20px;

    width:280px;
    height:420px;

    background:white;

    border-radius:20px;

    box-shadow:0 0 15px rgba(0,0,0,.2);

    overflow:hidden;

}

#teacherAvatar{

    height:220px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:130px;

    background:#FFF3E0;
}

#teacherText{

    padding:15px;

    font-size:18px;

    line-height:1.6;

    min-height:120px;
}

#teacherBtns{

    text-align:center;
}

.teacherBtn{

    padding:8px 15px;

    border:none;

    background:#2196F3;

    color:white;

    border-radius:8px;

    cursor:pointer;
}

/* ===== 游戏节点 ===== */

.gameNode{

    position:absolute;

    width:180px;
    height:180px;

    background:white;

    border-radius:25px;

    box-shadow:0 0 15px rgba(0,0,0,.15);

    cursor:pointer;

    transition:.3s;

    display:flex;
    flex-direction:column;

    justify-content:center;

    align-items:center;

}

.gameNode:hover{

    transform:scale(1.08);

}

.gameIcon{

    font-size:70px;
}

.gameTitle{

    margin-top:10px;

    font-size:22px;

    font-weight:bold;
}

/* ===== 地图布局 ===== */

#cook{

    left:420px;
    top:220px;
}

#library{

    right:420px;
    top:220px;
}

#brush{

    left:420px;
    bottom:120px;
}

#branch{

    right:420px;
    bottom:120px;
}

/* ===== 成就栏 ===== */

#achievement{

    position:absolute;

    right:20px;
    top:20px;

    width:280px;

    background:white;

    border-radius:20px;

    padding:20px;

    box-shadow:0 0 15px rgba(0,0,0,.15);
}

#achievement h2{

    text-align:center;
    margin-bottom:15px;
}

.badge{

    margin:10px 0;
    padding:10px;
    background:#FFF8E1;
    border-radius:10px;
}

/* ===== 教师模式 ===== */

#teacherMode{

    position:absolute;

    bottom:20px;
    left:20px;

    background:#673AB7;

    color:white;

    border:none;

    padding:12px 20px;

    border-radius:10px;

    cursor:pointer;
}

</style>
</head>

<body>

<header>
🏰 算法王国大冒险
</header>

<div id="gameMap">

<!-- 城堡 -->

<div id="castle">
🏰
</div>

<!-- AI教师 -->

<div id="teacherPanel">

<div id="teacherAvatar">
👩‍🏫
</div>

<div id="teacherText">

欢迎来到算法王国！

今天我们将学习：

什么是算法？

算法就是完成任务的步骤哦！

请选择一个游戏开始挑战吧！

</div>

<div id="teacherBtns">

<button
class="teacherBtn"
onclick="welcomeSpeak()">
🔊 重新讲解
</button>

</div>

</div>

<!-- 游戏一 -->

<div
class="gameNode"
id="cook"
onclick="openGame('cook')">

<div class="gameIcon">
🍅
</div>

<div class="gameTitle">
厨房小厨神
</div>

</div>

<!-- 游戏二 -->

<div
class="gameNode"
id="library"
onclick="openGame('library')">

<div class="gameIcon">
📚
</div>

<div class="gameTitle">
图书馆达人
</div>

</div>

<!-- 游戏三 -->

<div
class="gameNode"
id="brush"
onclick="openGame('brush')">

<div class="gameIcon">
🪥
</div>

<div class="gameTitle">
机器人刷牙
</div>

</div>

<!-- 游戏四 -->

<div
class="gameNode"
id="branch"
onclick="openGame('branch')">

<div class="gameIcon">
🚦
</div>

<div class="gameTitle">
算法岔路口
</div>

</div>

<!-- 成就 -->

<div id="achievement">

<h2>
🏆 我的成就
</h2>

<div class="badge">
⚪ 厨房达人
</div>

<div class="badge">
⚪ 借书达人
</div>

<div class="badge">
⚪ 刷牙达人
</div>

<div class="badge">
⚪ 算法大师
</div>

</div>

<button id="teacherMode">

👨‍🏫 教师模式

</button>

</div>

<script>

/* ======================
AI数字人教师
====================== */

function speak(text){

if(!window.speechSynthesis){

alert("当前浏览器不支持语音");

return;

}

const msg =
new SpeechSynthesisUtterance(text);

msg.lang="zh-CN";

msg.rate=1;

speechSynthesis.speak(msg);

}

function welcomeSpeak(){

const text=
"欢迎来到算法王国。同学们，算法就是完成任务的一系列步骤。请选择一个游戏开始挑战吧。";

speak(text);

}

/* ======================
游戏入口
====================== */

function openGame(type){

switch(type){

case "cook":

renderCookGame();

break;

case "library":

renderLibraryGame();

break;

case "brush":

renderBrushGame();

break;

case "branch":

renderBranchGame();

break;

}

}

/* ======================
启动欢迎
====================== */

window.onload=()=>{

setTimeout(
welcomeSpeak,
1000
);

}

</script>

<script src="js/game.js"></script>
<script src="js/achievement.js"></script>
<script src="js/cookGame.js"></script>
<script src="js/libraryGame.js"></script>
<script src="js/brushGame.js"></script>
<script src="js/branchGame.js"></script>
<script src="js/certificate.js"></script>

</body>
</html>
