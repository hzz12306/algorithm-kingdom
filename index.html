<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>算法王国大冒险</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ====== 顶部导航 ====== -->
<header>
  <div class="headerInner">
    <span class="headerLogo">🏰</span>
    <h1>算法王国大冒险</h1>
    <span class="headerLogo right">⭐</span>
  </div>
</header>

<!-- ====== 主页面 ====== -->
<div id="gameMap">

  <!-- 装饰云朵 -->
  <div class="decoCloud c1">☁️</div>
  <div class="decoCloud c2">☁️</div>
  <div class="decoCloud c3">☁️</div>
  <div class="decoStar s1">⭐</div>
  <div class="decoStar s2">✨</div>

  <!-- ====== Hero 区域 ====== -->
  <section class="heroBanner">
    <div class="heroTeacher">
      <div class="teacherAvatar">👩‍🏫</div>
      <div class="teacherBubble" id="teacherText">
        欢迎来到算法王国！<br>
        算法就是完成任务的一系列步骤哦！<br>
        选一个游戏开始挑战吧！
      </div>
      <div class="teacherBtns">
        <button class="teacherVoiceBtn" onclick="welcomeSpeak()">🔊 听讲解</button>
        <button class="teacherVoiceBtn" onclick="showProfileModal(false)" style="background:linear-gradient(135deg,#FF7043,#E64A19)">👤 填写信息</button>
      </div>
    </div>
    <div class="heroRight">
      <div class="heroCastle">🏰</div>
      <p class="heroSub">完成 4 个挑战，成为<strong>算法大师</strong></p>
    </div>
  </section>

  <!-- ====== 主内容区 ====== -->
  <div class="mainContent">

    <!-- 左侧：游戏卡片 -->
    <div class="gameGrid">

      <div class="gameNode" onclick="openGame('cook')" style="--gc:#FF7043;--gb:linear-gradient(135deg,#FFF3E0,#FFE0B2)">
        <div class="gameNodeBg" style="background-image:url(images/厨神.png)"></div>
        <div class="gameNodeOverlay"></div>
        <div class="gameNodeBody">
        </div>
      </div>

      <div class="gameNode" onclick="openGame('library')" style="--gc:#42A5F5;--gb:linear-gradient(135deg,#E3F2FD,#BBDEFB)">
        <div class="gameNodeBg" style="background-image:url(images/图书馆.png)"></div>
        <div class="gameNodeOverlay"></div>
        <div class="gameNodeBody">
        </div>
      </div>

      <div class="gameNode" onclick="openGame('brush')" style="--gc:#26A69A;--gb:linear-gradient(135deg,#E0F2F1,#B2DFDB)">
        <div class="gameNodeBg" style="background-image:url(images/刷牙.png)"></div>
        <div class="gameNodeOverlay"></div>
        <div class="gameNodeBody">
        </div>
      </div>

      <div class="gameNode" onclick="openGame('branch')" style="--gc:#FFA726;--gb:linear-gradient(135deg,#FFF8E1,#FFE082)">
        <div class="gameNodeBg" style="background-image:url(images/回家.png)"></div>
        <div class="gameNodeOverlay"></div>
        <div class="gameNodeBody">
        </div>
      </div>

    </div>

    <!-- 右侧：信息面板 -->
    <aside class="sidePanel">

      <div id="achievement">
        <div class="achieveTop">
          <span class="profileMini">👤 <span id="profileDisplay"></span></span>
          <button id="studentProfileBtn" onclick="editProfile()" style="display:none">修改</button>
        </div>
        <h2>🏆 成就</h2>
        <div class="badgeGrid">
          <div class="badge">⚪ 厨房达人</div>
          <div class="badge">⚪ 借书达人</div>
          <div class="badge">⚪ 刷牙达人</div>
          <div class="badge">⚪ 分支达人</div>
        </div>
        <button id="certificateBtn" onclick="renderCertificate()" style="display:none">🎓 领取证书</button>

        <div id="statsPanel">
          <div class="statProgress">
            <div class="statProgressBar" style="width:0%"></div>
            <span>完成进度 0/4</span>
          </div>
          <div class="statRowCompact">
            <span>📝 <strong>0 次</strong></span>
            <span>⏱️ <strong>0秒</strong></span>
            <span>🎯 <strong>0%</strong></span>
          </div>
          <div class="statRowCompact">
            <span>⭐ <strong id="totalScoreDisplay">0/200</strong></span>
            <span>🏅 <strong id="levelDisplay">--</strong></span>
          </div>
          <div class="statMiniCompact" id="gameStatsList">
            <div class="gameStatRow" id="gsCook"><span>🍅 厨房</span><span class="gsRight" id="statCook">⏳ --</span></div>
            <div class="gameStatRow" id="gsLibrary"><span>📚 图书馆</span><span class="gsRight" id="statLibrary">⏳ --</span></div>
            <div class="gameStatRow" id="gsBrush"><span>🪥 刷牙</span><span class="gsRight" id="statBrush">⏳ --</span></div>
            <div class="gameStatRow" id="gsBranch"><span>🚦 岔路口</span><span class="gsRight" id="statBranch">⏳ --</span></div>
          </div>
        </div>
      </div>

      <div class="btnRow">
        <button class="sideBtn" onclick="renderGrowthRecord()">📒 成长记录</button>
        <button class="sideBtn" onclick="showLeaderboard()">📊 排行榜</button>
      </div>

    </aside>

  </div>

  <!-- 底部操作栏 -->
  <div class="bottomBar">
    <button id="teacherMode">👨‍🏫 教师模式</button>
  </div>

</div>

<script>

/* ======================
AI 语音教师
====================== */

function speak(text){
  if(!window.speechSynthesis){
    alert("当前浏览器不支持语音");
    return;
  }
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang="zh-CN";
  msg.rate=1.3;
  speechSynthesis.speak(msg);
}

function welcomeSpeak(){
  speak("欢迎来到算法王国。同学们，算法就是完成任务的一系列步骤。请选择一个游戏开始挑战吧。");
}

/* ======================
游戏入口
====================== */

function openGame(type){
  switch(type){
    case "cook": renderCookGame(); break;
    case "library": renderLibraryGame(); break;
    case "brush": renderBrushGame(); break;
    case "branch": renderBranchGame(); break;
  }
}

/* ======================
启动欢迎
====================== */

window.onload=()=>{
  loadAchievements();
  updateStatsPanel();
  const profile = getStudentProfile ? getStudentProfile() : null;
  if (profile) {
    const d = document.getElementById("profileDisplay");
    if (d) d.textContent = profile.name + (profile.className ? " · " + profile.className : "");
    document.getElementById("studentProfileBtn").style.display = "";
  } else {
    setTimeout(() => showProfileModal(true), 800);
  }
  setTimeout(welcomeSpeak, 1000);
}

</script>

<script src="js/game.js"></script>
<script src="js/achievement.js"></script>
<script src="js/cookGame.js"></script>
<script src="js/libraryGame.js"></script>
<script src="js/brushGame.js"></script>
<script src="js/branchGame.js"></script>
<script src="js/certificate.js"></script>
<script src="js/leaderboard.js"></script>

</body>
</html>
