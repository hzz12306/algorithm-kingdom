<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>算法王国大冒险</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ====== 顶部导航 ====== -->
<header>
  <div class="headerInner">
    <span class="headerLogo">🏰</span>
    <h1>算法王国大冒险</h1>
    <span class="headerLogo right">⭐</span>
  </div>
</header>

<!-- ====== 主页面 ====== -->
<div id="gameMap">

  <!-- 装饰云朵 -->
  <div class="decoCloud c1">☁️</div>
  <div class="decoCloud c2">☁️</div>
  <div class="decoCloud c3">☁️</div>
  <div class="decoStar s1">⭐</div>
  <div class="decoStar s2">✨</div>

  <!-- ====== Hero 区域 ====== -->
  <section class="heroBanner">
    <div class="heroTeacher">
      <div class="teacherAvatar">👩‍🏫</div>
      <div class="teacherBubble" id="teacherText">
        欢迎来到算法王国！<br>
        算法就是完成任务的一系列步骤哦！<br>
        选一个游戏开始挑战吧！
      </div>
      <button class="teacherVoiceBtn" onclick="welcomeSpeak()">🔊 听讲解</button>
    </div>
    <div class="heroRight">
      <div class="heroCastle">🏰</div>
      <p class="heroSub">完成 4 个挑战，成为<strong>算法大师</strong></p>
    </div>
  </section>

  <!-- ====== 主内容区 ====== -->
  <div class="mainContent">

    <!-- 左侧：游戏卡片 -->
    <div class="gameGrid">

      <div class="gameNode" onclick="openGame('cook')" style="--gc:#FF7043;--gb:linear-gradient(135deg,#FFF3E0,#FFE0B2)">
        <div class="gameNodeBg" style="background-image:url(images/厨神.png)"></div>
        <div class="gameNodeOverlay"></div>
        <div class="gameNodeBody">
        </div>
      </div>

      <div class="gameNode" onclick="openGame('library')" style="--gc:#42A5F5;--gb:linear-gradient(135deg,#E3F2FD,#BBDEFB)">
        <div class="gameNodeBg" style="background-image:url(images/图书馆.png)"></div>
        <div class="gameNodeOverlay"></div>
        <div class="gameNodeBody">
        </div>
      </div>

      <div class="gameNode" onclick="openGame('brush')" style="--gc:#26A69A;--gb:linear-gradient(135deg,#E0F2F1,#B2DFDB)">
        <div class="gameNodeBg" style="background-image:url(images/刷牙.png)"></div>
        <div class="gameNodeOverlay"></div>
        <div class="gameNodeBody">
        </div>
      </div>

      <div class="gameNode" onclick="openGame('branch')" style="--gc:#FFA726;--gb:linear-gradient(135deg,#FFF8E1,#FFE082)">
        <div class="gameNodeBg" style="background-image:url(images/回家.png)"></div>
        <div class="gameNodeOverlay"></div>
        <div class="gameNodeBody">
        </div>
      </div>

    </div>

    <!-- 右侧：信息面板 -->
    <aside class="sidePanel">

      <!-- 成就 + 数据统计 -->
      <div id="achievement">
        <h2>🏆 我的成就</h2>
        <div class="badge">⚪ 厨房达人</div>
        <div class="badge">⚪ 借书达人</div>
        <div class="badge">⚪ 刷牙达人</div>
        <div class="badge">⚪ 分支达人</div>
        <button id="certificateBtn" onclick="renderCertificate()" style="display:none">🎓 领取证书</button>

        <div class="achieveDivider"></div>

        <div id="statsPanel">
          <h3>📊 游戏数据</h3>
          <div class="statProgress">
            <div class="statProgressBar" style="width:0%"></div>
            <span>完成进度 0/4</span>
          </div>
          <div class="statList">
            <div class="statItem"><span>📝 总尝试</span><strong>0 次</strong></div>
            <div class="statItem"><span>⏱️ 总用时</span><strong>0秒</strong></div>
            <div class="statItem"><span>🎯 最佳准确率</span><strong>0%</strong></div>
          </div>
          <div class="statDivider"></div>
          <div class="statMini">
            <div>🍅 厨房 <span id="statCook">⏳ --</span></div>
            <div>📚 图书馆 <span id="statLibrary">⏳ --</span></div>
            <div>🪥 刷牙 <span id="statBrush">⏳ --</span></div>
            <div>🚦 岔路口 <span id="statBranch">⏳ --</span></div>
          </div>
        </div>
      </div>

    </aside>

  </div>

  <!-- 底部操作栏 -->
  <div class="bottomBar">
    <button id="teacherMode">👨‍🏫 教师模式</button>
  </div>

</div>

<script>

/* ======================
AI 语音教师
====================== */

function speak(text){
  if(!window.speechSynthesis){
    alert("当前浏览器不支持语音");
    return;
  }
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang="zh-CN";
  msg.rate=1.3;
  speechSynthesis.speak(msg);
}

function welcomeSpeak(){
  speak("欢迎来到算法王国。同学们，算法就是完成任务的一系列步骤。请选择一个游戏开始挑战吧。");
}

/* ======================
游戏入口
====================== */

function openGame(type){
  switch(type){
    case "cook": renderCookGame(); break;
    case "library": renderLibraryGame(); break;
    case "brush": renderBrushGame(); break;
    case "branch": renderBranchGame(); break;
  }
}

/* ======================
启动欢迎
====================== */

window.onload=()=>{
  loadAchievements();
  setTimeout(welcomeSpeak, 1000);
}

</script>

<script src="js/game.js"></script>
<script src="js/achievement.js"></script>
<script src="js/cookGame.js"></script>
<script src="js/libraryGame.js"></script>
<script src="js/brushGame.js"></script>
<script src="js/branchGame.js"></script>
<script src="js/certificate.js"></script>

</body>
</html>
